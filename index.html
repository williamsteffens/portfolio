<head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <script>
        // Set theme based on localStorage or system preference before the page renders to avoid a flash of incorrect theme
        (function () {
            const stored = localStorage.getItem("theme");
            const usesDark =
                stored === "dark" 
                || (!stored && matchMedia("(prefers-color-scheme: dark)").matches);

            document.documentElement.classList.toggle("dark", usesDark);
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
